<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 · 亦梦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #1e1e1e;
            line-height: 1.6;
            font-size: 16px;
            padding: 2rem 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            margin: 0 0 2rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eaeaea;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #6b6b6b;
            font-size: 1rem;
        }
        .nav-links a:hover,
        .nav-links a[style*="color:#1e1e1e"] {
            color: #1e1e1e;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            margin: 1rem 0 1.5rem;
        }
        .intro {
            margin-bottom: 2rem;
            color: #5a5a5a;
        }
        /* 联系方式列表（紧凑无空白） */
        .contact-list {
            list-style: none;
            margin-bottom: 2.5rem;
            border: 1px solid #eaeaea;
            border-radius: 0;
            overflow: hidden;
        }
        .contact-list li {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #eaeaea;
            background: #fff;
        }
        .contact-list li:last-child {
            border-bottom: none;
        }
        .contact-icon {
            width: 30px;
            font-size: 1.2rem;
            color: #6b6b6b;
            margin-right: 1rem;
            text-align: center;
        }
        .contact-detail {
            flex: 1;
            color: #3a3a3a;
        }
        .contact-detail a {
            color: #1e1e1e;
            text-decoration: underline;
            text-underline-offset: 0.15rem;
            text-decoration-thickness: 1px;
            text-decoration-color: #ccc;
        }
        .contact-detail a:hover {
            text-decoration-color: #1e1e1e;
        }
        /* 表单区域（与列表紧密衔接） */
        .form-section {
            margin-top: 2rem;
        }
        .form-section h2 {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            color: #2a2a2a;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            background: #fafafa;
            transition: border 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #888;
            background: #fff;
        }
        button {
            background: #1e1e1e;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #3a3a3a;
        }
        .note {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #8a8a8a;
        }
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #eaeaea;
            font-size: 0.9rem;
            color: #8a8a8a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
        }
        .footer-links a {
            margin-left: 1.5rem;
            color: #5a5a5a;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            body { padding: 1.5rem; }
            .nav-links { gap: 1rem; flex-wrap: wrap; }
            .contact-list li { padding: 0.8rem 1rem; }
            .footer { flex-direction: column; align-items: center; }
            .footer-links a { margin: 0 0.8rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- 导航区 -->
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
        <a href="projects.html">实战</a>
        <a href="blog.html">创作</a>
        <a href="contact.html" style="color:#1e1e1e;">联系</a>
    </div>

    <h1>联系我</h1>
    <p class="intro">有任何问题或想法，欢迎通过以下方式找到我。</p>

    <!-- 联系方式列表（紧凑） -->
    <ul class="contact-list">
        <li>
            <span class="contact-icon"><i class="fas fa-envelope"></i></span>
            <span class="contact-detail"><strong>邮箱：</strong> <a href="mailto:1593285374@qq.com">1593285374@qq.com</a></span>
        </li>
        <li>
            <span class="contact-icon"><i class="fab fa-github"></i></span>
            <span class="contact-detail"><strong>GitHub：</strong> <a href="https://github.com/Yi-yun-feng" target="_blank">Yi-yun-feng</a></span>
        </li>
        <li>
            <span class="contact-icon"><i class="fas fa-blog"></i></span>
            <span class="contact-detail"><strong>CSDN博客：</strong> <a href="https://blog.csdn.net/2501_93027236" target="_blank">2501_93027236</a></span>
        </li>
        <li>
            <span class="contact-icon"><i class="fas fa-graduation-cap"></i></span>
            <span class="contact-detail"><strong>学校：</strong> 桂林电子科技大学 · 密码科学与技术</span>
        </li>
    </ul>

    <!-- 表单区域（与列表紧密衔接） -->
    <div class="form-section">
        <h2>或直接留言（演示表单）</h2>
        <form onsubmit="alert('感谢留言！此表单为演示，暂不实际发送。'); return false;">
            <div class="form-group">
                <label for="name">姓名：</label>
                <input type="text" id="name" placeholder="你的名字">
            </div>
            <div class="form-group">
                <label for="email">邮箱：</label>
                <input type="email" id="email" placeholder="你的邮箱">
            </div>
            <div class="form-group">
                <label for="message">留言：</label>
                <textarea id="message" rows="4" placeholder="想对我说什么？"></textarea>
            </div>
            <button type="submit">发送（演示）</button>
            <p class="note">* 此表单仅为前端演示，暂不实际发送邮件</p>
        </form>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <div>© 2026 亦梦 · 桂电密码科学与技术</div>
        <div class="footer-links">
            <a href="https://github.com/Yi-yun-feng">GitHub</a>
            <a href="https://blog.csdn.net/2501_93027236">CSDN</a>
            <a href="mailto:1593285374@qq.com">Email</a>
        </div>
    </div>
</body>
</html>
