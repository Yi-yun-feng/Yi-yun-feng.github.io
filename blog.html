<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 · 亦梦</title>
    <!-- 采用极简风格，完全无动画 -->
    <style>
        /* ---------- 极简重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #1e1e1e;
            line-height: 1.6;
            font-size: 16px;
            padding: 2rem 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 导航区 */
        .nav-links {
            display: flex;
            gap: 2rem;
            margin: 2rem 0 3rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eaeaea;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #6b6b6b;
            font-size: 1rem;
        }

        .nav-links a:hover {
            color: #1e1e1e;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        /* 网格布局：四个卡片 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;  /* 增加间距防止重叠 */
            margin: 2rem 0 3rem 0;
        }

        /* 卡片样式：极简，无背景色，仅靠分割线区分 */
        .card {
            border: 1px solid #eaeaea;
            border-radius: 0;
            padding: 1.5rem 1.2rem;
            background: #fff;
            transition: none;
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #1e1e1e;
        }

        .card p {
            color: #3a3a3a;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .card a {
            display: inline-block;
            color: #1e1e1e;
            text-decoration: underline;
            text-underline-offset: 0.15rem;
            text-decoration-thickness: 1px;
            text-decoration-color: #ccc;
            font-weight: 500;
        }

        .card a:hover {
            text-decoration-color: #1e1e1e;
        }

        /* 平台图标（可选） */
        .card i {
            font-size: 1.8rem;
            color: #6b6b6b;
            margin-bottom: 1rem;
            display: inline-block;
        }

        /* 页脚 */
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #eaeaea;
            font-size: 0.9rem;
            color: #8a8a8a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
        }

        .footer-links a {
            margin-left: 1.5rem;
            color: #5a5a5a;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body { padding: 1.5rem; }
            .nav-links { gap: 1rem; flex-wrap: wrap; }
            .card-grid { gap: 1.5rem; }
            .footer { flex-direction: column; align-items: center; text-align: center; }
            .footer-links a { margin: 0 0.8rem; }
        }
    </style>
    <!-- 引入 Font Awesome 图标库（可选，用于显示图标） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- 导航区 - 与首页一致 -->

        <div class="footer-links">
            <a href="https://github.com/Yi-yun-feng">GitHub</a>

            <a href="mailto:1593285374@qq.com">Email</a>

    </div>
</body>
</html>
